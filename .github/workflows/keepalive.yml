name: keep-oyrial-bot-awake

# Pings the Oyrial n8n bot so its HuggingFace Space never sleeps.
# GitHub schedulers run on GitHub's own infra (they never sleep).
# NOTE: must live on the repo's DEFAULT branch. GitHub disables scheduled
# workflows after 60 days of NO repo activity — push any commit to re-arm.

on:
  schedule:
    - cron: "*/10 * * * *"     # every 10 min (GitHub's floor is 5 but it throttles; 10 is reliable)
  workflow_dispatch: {}         # lets you run it by hand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping n8n /healthz
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://samiiii7-oyrial-n8n-free.hf.space/healthz)
          echo "healthz -> $code"
          test "$code" = "200"
